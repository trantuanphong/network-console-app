name: Build Java Jar with run.bat

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compile Java
        run: |
          mkdir -p build
          javac -d build src/NetworkConsoleApp.java

      - name: Create jar
        run: |
          echo "Main-Class: NetworkConsoleApp" > manifest.txt
          jar cfm NetworkConsoleApp.jar manifest.txt -C build .

      - name: Create run.bat for Windows
        run: |
          echo @echo off > run.bat
          echo java -jar NetworkConsoleApp.jar >> run.bat
          echo pause >> run.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkConsoleApp
          path: |
            NetworkConsoleApp.jar
            run.bat
